<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=100VH, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Virtual Library</title>
</head>


<body>

<div id="search-bar">
<h1>Babylon</h1>
<button id="new-book">+</button>
</div>

<div id="new-book-modal"> 
    <form id="form" class="modal-inner">

      <div class="header">
      <p class="title">Add Book</p>
      <button id="close-modal" type="button" >x</button>
      </div>
 
        <label for="title"><input type="text" name="title" id="title" required><span>Title</span></label>
       
     

     
        <label for="author">   <input type="text" name="author" id="author" required><span>Author</span></label>
     
 

 
        <label for="pages"> <input type="number" name="pages" id="pages" required><span>Pages</span></label>
       


   
        <div class="toggle-container"> 

          <span id="Book-Completed">Book Completed:</span>
      
          <label for="toggleBtn">
      
              <input name="read" type="checkbox" id="toggleBtn" checked="true">
      
              <div class="toggler">
      
                  <div class="cross">✕</div>
      
                  <div class="tick">✓</div>
      
                  <div class="togglerSlider"></div>
      
              </div>
      
          </label>

          <button id="submit" type="submit">Add To Shelf</button>
      
      </div>
        
 

     
   </form>
</div>

<div id="content-bar"></div> 


    
</body>


<script src="power.js"></script>
</html>
